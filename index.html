<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Santa Muerte Wiki // Hidden Knowledge</title>
    <style>
        :root {
            --dark: #070707;
            --panel: #121212;
            --gold: #d4af37;
            --blood: #630000;
            --text: #c0c0c0;
            --accent: #e5c100;
            --f-serif: 'Garamond', 'Georgia', serif;
        }

        body {
            background: var(--dark);
            color: var(--text);
            font-family: 'Inter', 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
            background-image: url('https://www.transparenttextures.com/patterns/dark-matter.png');
        }

        .search-box { position: fixed; top: 20px; right: 30px; z-index: 999; }
        #find-input {
            background: #1a1a1a; border: 1px solid #333; border-radius: 30px;
            padding: 10px 18px; color: #fff; width: 180px; font-size: 13px; outline: none;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #find-input:focus { width: 240px; border-color: var(--gold); }
        #res-list {
            position: absolute; top: 45px; right: 0; background: #1a1a1a;
            border: 1px solid #222; width: 260px; border-radius: 12px;
            padding: 5px; display: none; list-style: none; box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }
        .res-link { padding: 10px; cursor: pointer; border-radius: 8px; font-size: 13px; }
        .res-link:hover { background: #252525; color: var(--gold); }

        .altar-sidebar { width: 300px; background: var(--panel); border-right: 1px solid #1f1f1f; padding: 30px 15px; overflow-y: auto; }
        .group-label {
            font-family: var(--f-serif); color: var(--gold); padding: 12px 20px;
            cursor: pointer; display: flex; justify-content: space-between;
            border-radius: 12px; margin-bottom: 5px; font-size: 17px; transition: 0.2s;
        }
        .group-label:hover { background: rgba(212, 175, 55, 0.05); }
        .sub-links { max-height: 0; overflow: hidden; transition: 0.4s ease-in-out; }
        .open .sub-links { max-height: 600px; margin-bottom: 10px; }
        .link-node { padding: 8px 35px; font-size: 14px; cursor: pointer; border-radius: 20px; color: #888; transition: 0.2s; }
        .link-node:hover { color: #fff; padding-left: 40px; }
        .link-node.active { color: var(--dark); background: var(--gold); font-weight: 600; }

        .reading-room { flex: 1; padding: 80px 40px; overflow-y: auto; background: radial-gradient(circle at top right, #0f0f0f, #070707); }
        .article-wrap { max-width: 680px; margin: 0 auto; }
        h2#at-title { font-family: var(--f-serif); color: var(--accent); font-size: 3rem; margin: 0; }
        p#at-sub { color: var(--blood); text-transform: uppercase; font-size: 12px; font-weight: 700; letter-spacing: 2px; margin-bottom: 40px; }
        #at-body { line-height: 1.7; font-size: 17px; color: rgba(255,255,255,0.85); }
        mark { background: var(--gold); color: #000; border-radius: 2px; padding: 0 2px; }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #222; }
    </style>
</head>
<body>

    <div class="search-box">
        <input type="text" id="find-input" placeholder="Search archives..." oninput="doSearch()">
        <ul id="res-list"></ul>
    </div>

    <aside class="altar-sidebar" id="nav-list"></aside>

    <main class="reading-room">
        <div class="article-wrap">
            <h2 id="at-title">Loading...</h2>
            <p id="at-sub"></p>
            <div id="at-body"></div>
        </div>
    </main>

    <script>
        let _data = [];

        // —— НАСТРОЙКИ ХРАНИЛИЩА ——
        const BIN_ID = 'ТВОЙ_BIN_ID'; // Замени на свой ID
        const API_KEY = 'ТВОЙ_X_MASTER_KEY'; // Замени на свой ключ

        async function init() {
            try {
                // Тянем данные из живого JSON
                const r = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
                    headers: { 'X-Master-Key': API_KEY }
                });
                const res = await r.json();
                _data = res.record; // JSONbin кладет данные в поле record
                
                buildMenu();
                show('about'); // ID стартовой статьи
            } catch (e) { 
                console.error('Connection lost', e); 
                document.getElementById('at-title').innerText = "Ошибка связи";
            }
        }

        function buildMenu() {
            const n = document.getElementById('nav-list');
            n.innerHTML = '';
            _data.forEach(g => {
                const wrap = document.createElement('div');
                wrap.className = 'group-node';
                wrap.id = g.id;
                wrap.innerHTML = `<div class="group-label" onclick="tg('${g.id}')">${g.category} <span>+</span></div>`;
                
                const ul = document.createElement('div');
                ul.className = 'sub-links';
                for (let k in g.items) {
                    const li = document.createElement('div');
                    li.className = 'link-node';
                    li.id = `node-${k}`;
                    li.innerText = g.items[k].title;
                    li.onclick = (e) => { e.stopPropagation(); show(k); };
                    ul.appendChild(li);
                }
                wrap.appendChild(ul);
                n.appendChild(wrap);
            });
        }

        function tg(id, force) {
            const el = document.getElementById(id);
            if(force) el.classList.add('open');
            else el.classList.toggle('open');
        }

        function show(key, q) {
            let item = null;
            let pid = '';
            _data.forEach(g => { if(g.items[key]) { item = g.items[key]; pid = g.id; } });
            if(!item) return;

            tg(pid, true);
            document.querySelectorAll('.link-node').forEach(l => l.classList.remove('active'));
            const active = document.getElementById(`node-${key}`);
            if(active) active.classList.add('active');

            document.getElementById('at-title').innerText = item.title;
            document.getElementById('at-sub').innerText = item.sub;
            
            let txt = item.text;
            if(q) txt = txt.replace(new RegExp(`(${q})`, 'gi'), '<mark>$1</mark>');
            document.getElementById('at-body').innerHTML = txt;
        }

        function doSearch() {
            const q = document.getElementById('find-input').value.toLowerCase();
            const list = document.getElementById('res-list');
            list.innerHTML = '';
            if(q.length < 2) { list.style.display = 'none'; return; }

            _data.forEach(g => {
                for(let k in g.items) {
                    if(g.items[k].text.toLowerCase().includes(q) || g.items[k].title.toLowerCase().includes(q)) {
                        const li = document.createElement('li');
                        li.className = 'res-link';
                        li.innerHTML = `<b>${g.items[k].title}</b><br><small style="opacity:0.5">${g.category}</small>`;
                        li.onclick = () => { show(k, q); list.style.display='none'; document.getElementById('find-input').value=''; };
                        list.appendChild(li);
                    }
                }
            });
            list.style.display = list.children.length ? 'block' : 'none';
        }

        init();
    </script>
</body>
</html>
